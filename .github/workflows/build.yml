name: Build Windows EXE

on:
  push:
    tags:
      - "v*"   # triggers on tags like v1.0.0

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install faster-whisper moviepy

      - name: Build with PyInstaller
        run: pyinstaller briefing.spec --noconfirm

      - name: Verify output
        run: |
          if (!(Test-Path "dist\briefing\briefing.exe")) {
            Write-Error "briefing.exe not found — build failed"
            exit 1
          }
        shell: pwsh

      - name: Create ZIP archive
        run: Compress-Archive -Path dist\briefing -DestinationPath dist\briefing-${{ github.ref_name }}-windows.zip
        shell: pwsh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Briefing ${{ github.ref_name }}"
          body: |
            ## Download

            1. Download `briefing-${{ github.ref_name }}-windows.zip`
            2. Extract to any folder (e.g. `C:\briefing\`)
            3. Create `data\config.txt` with your API keys:
               ```
               API_KEY=your_openai_api_key
               API_URL=https://api.openai.com/v1/chat/completions
               NTFY_SERVER=your_ntfy_topic
               ```
            4. Run `briefing.exe` — the window opens automatically
          files: dist/briefing-${{ github.ref_name }}-windows.zip
