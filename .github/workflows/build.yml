name: Build

on:
  push:
    tags:
      - "v*"   # triggers on tags like v1.0.0

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest      # Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: Build with PyInstaller
        run: pyinstaller packaging/briefing.spec --noconfirm

      # ---------- Windows ----------
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "dist\briefing\briefing.exe")) {
            Write-Error "briefing.exe not found — build failed"; exit 1
          }
          Compress-Archive -Path dist\briefing -DestinationPath "dist\briefing-${{ github.ref_name }}-windows.zip"

      # ---------- macOS ----------
      - name: Sign and package (macOS)
        if: runner.os == 'macOS'
        run: |
          test -d "dist/Briefing.app" || { echo "Briefing.app not found — build failed"; exit 1; }
          # Strip resource forks / xattrs that break ad-hoc codesign, then sign so the
          # app can run on Apple Silicon (unsigned arm64 binaries are killed as "damaged").
          ditto --norsrc --noextattr "dist/Briefing.app" "dist/_clean.app"
          rm -rf "dist/Briefing.app"
          mv "dist/_clean.app" "dist/Briefing.app"
          codesign --force --deep --sign - "dist/Briefing.app"
          codesign --verify --deep --strict --verbose=2 "dist/Briefing.app"
          # Stage the dmg: the app + an Applications shortcut for drag-install.
          mkdir -p dist/dmg
          ditto "dist/Briefing.app" "dist/dmg/Briefing.app"
          ln -s /Applications "dist/dmg/Applications"
          hdiutil create -volname "Briefing" -srcfolder "dist/dmg" \
            -ov -format UDZO "dist/briefing-${{ github.ref_name }}-macos.dmg"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Briefing ${{ github.ref_name }}"
          body: |
            ## Download

            **Windows** — `briefing-${{ github.ref_name }}-windows.zip`
            1. Extract to any folder (e.g. `C:\briefing\`)
            2. Run `briefing.exe` — the panel opens automatically

            **macOS (Apple Silicon)** — `briefing-${{ github.ref_name }}-macos.dmg`
            1. Open the `.dmg` and drag **Briefing** into the **Applications** folder
            2. First launch: double-click **Briefing** (it's blocked), then open
               **System Settings ▸ Privacy & Security**, scroll down and click
               **Open Anyway** (the app isn't Apple-notarized). After that it opens normally.

            Then open the **Secrets** panel and fill in your API Key, API URL, and NTFY Server, and save.

            **Uninstall**
            - Windows: delete the extracted folder.
            - macOS: drag **Briefing** to Trash, then delete `~/Library/Application Support/Briefing/` for a full clean.
          files: |
            dist/briefing-${{ github.ref_name }}-windows.zip
            dist/briefing-${{ github.ref_name }}-macos.dmg
