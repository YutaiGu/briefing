<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runner Panel</title>
  <style>
    :root { font-family: "Segoe UI", system-ui, sans-serif; }
    body { margin: 0; background: #f6f7fb; color: #1c1f23; }
    .shell { max-width: 1400px; margin: 32px auto; padding: 0 20px; display: grid; gap: 20px; }
    h2 { margin: 0 0 8px; }
    section { background: #fff; border: 1px solid #e2e5ec; border-radius: 10px; padding: 16px 18px; box-shadow: 0 4px 14px rgba(0,0,0,0.04); }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 14px; }
    input, select { padding: 8px 10px; border: 1px solid #cfd5e0; border-radius: 6px; font-size: 14px; }
    button { padding: 8px 14px; border: 1px solid #1f6feb; background: #1f6feb; color: #fff; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }
    .muted { color: #6b7280; }
    .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .logbox { background: #111; color: #0f0; padding: 12px; border-radius: 8px; max-height: 340px; overflow-y: auto; white-space: pre-wrap; overflow-wrap: break-word; font-family: "Cascadia Code", Consolas, monospace; }
    .reportbox { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 14px; padding: 4px; }
    .report-group { background: #ffffff; border: 1px solid #dbe4f0; border-radius: 12px; padding: 12px; box-shadow: 0 4px 14px rgba(15,23,42,0.06); }
    .report-group-head { font-size: 13px; color: #1f2937; margin-bottom: 10px; padding: 8px 10px; border-left: 4px solid #0ea5e9; background: #f0f9ff; border-radius: 8px; font-weight: 700; }
    .report-group-items { display: grid; gap: 8px; }
    .report-local-items { display: grid; gap: 8px; }
    .report-item { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; display: flex; flex-direction: column; gap: 0; }
    .report-card-head { display: flex; flex-direction: column; gap: 3px; }
    .report-headline { font-weight: 700; color: #0f172a; font-size: 14px; line-height: 1.5; }
    .report-title { font-weight: 600; color: #0f172a; }
    .report-subtitle { font-size: 12px; color: #64748b; }
    .report-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .report-expand { border-top: 1px solid #e2e8f0; margin-top: 10px; padding-top: 10px; }
    .recommend-block { padding: 10px 14px; border-left: 3px solid #0ea5e9; background: #f0f9ff; border-radius: 0 6px 6px 0; color: #334155; font-size: 13px; line-height: 1.6; }
    .fb { margin: 6px 0 20px; }
    .fb-input { width: 100%; box-sizing: border-box; font-size: 12px; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; resize: vertical; font-family: inherit; }
    .fb-send { margin-top: 4px; font-size: 12px; padding: 5px 14px; border: none; border-radius: 6px; background: #2563eb; color: #fff; font-weight: 500; cursor: pointer; }
    .fb-send:hover { background: #1d4ed8; }
    .fb-status { font-size: 12px; color: #64748b; margin-left: 8px; }
    .md, .recommend-block, #report-modal-body { user-select: text; }
    .report-meta { font-size: 12px; color: #64748b; }
    .report-open { border: 1px solid #bfdbfe; background: #eff6ff; color: #1e3a8a; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .report-wrap { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; }
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }
    .dot-green { background: #22c55e; }
    .dot-gray { background: #64748b; }
    .dot-red { background: #ef4444; }
    .report-item.is-new { border-color: #fca5a5; background: #fff5f5; box-shadow: 0 0 0 2px rgba(239,68,68,0.14); }
    .progress-wrap { background: #ffffff; border: 1px solid #dbe4f0; border-radius: 12px; padding: 12px; box-shadow: 0 4px 14px rgba(15,23,42,0.06); }
    .progress-head { font-size: 13px; font-weight: 700; color: #1f2937; margin-bottom: 10px; }
    table.progress { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.progress th { text-align: left; color: #64748b; font-weight: 600; padding: 6px 10px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    table.progress th.num, table.progress td.num { text-align: right; }
    table.progress td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
    table.progress td.title { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #0f172a; }
    .cell { display: inline-flex; align-items: center; gap: 6px; }
    .cell.done { color: #16a34a; }
    .cell.pending { color: #94a3b8; }
    .cell.error { color: #ef4444; }
    .progress-empty { color: #94a3b8; font-size: 13px; padding: 8px 2px; }
    table.progress tr.done-row { background: #f0fdf4; }
    .bar { position: relative; width: 96px; height: 14px; background: #e2e8f0; border-radius: 7px; overflow: hidden; }
    .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: #22c55e; transition: width 0.4s; }
    .bar-label { position: relative; font-size: 10px; color: #0f172a; line-height: 14px; padding-left: 8px; }
    .spinner { width: 10px; height: 10px; border: 2px solid #f59e0b; border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal { position: fixed; inset: 0; background: rgba(2,6,23,0.72); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 50; }
    .modal.show { display: flex; }
    .modal-card { width: min(960px, 96vw); max-height: 85vh; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; display: grid; grid-template-rows: auto 1fr; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid #e5e7eb; }
    .modal-body { overflow-y: auto; padding: 14px; }
    .md { line-height: 1.65; color: #0f172a; }
    .md p { margin: 0 0 10px; }
    .md h1, .md h2, .md h3 { margin: 12px 0 8px; line-height: 1.35; }
    .md ul { margin: 8px 0 10px 20px; }
    .md code { background: #f1f5f9; padding: 1px 4px; border-radius: 4px; }
    .md pre { background: #0f172a; color: #e2e8f0; padding: 10px; border-radius: 8px; overflow-x: auto; }
    .tip { position: relative; display: inline-block; border-bottom: 1px dotted #9ca3af; }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      top: 110%;
      background: #111;
      color: #fff;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      white-space: pre-line;
      opacity: 0;
      pointer-events: none;
      transform: translateY(2px);
      transition: opacity 0.05s ease, transform 0.05s ease;
      z-index: 10;
      max-width: 280px;
    }
    .tip:hover::after { opacity: 1; transform: translateY(0); }
    .cn { font-size: 12px; color: #4b5563; line-height: 1.2; }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h2>Briefing Panel</h2>
    </header>

    <section>
      <details id="cfg-accordion">
        <summary style="cursor:pointer;font-weight:600;">Config Panel</summary>
        <div style="margin-top:12px;">
          <div id="config-grid" class="grid"></div>
          <button id="save-btn" style="margin-top:12px;">Save Config</button>
          <span id="save-status" class="muted"></span>
        </div>
      </details>
    </section>

    <section>
      <details id="secrets-accordion">
        <summary style="cursor:pointer;font-weight:600;">Secrets</summary>
        <div style="margin-top:12px;">
          <div id="secrets-grid" class="grid"></div>
          <button id="save-secrets-btn" style="margin-top:12px;">Save Secrets</button>
          <span id="secrets-status" class="muted"></span>
        </div>
      </details>
    </section>

    <section>
      <details id="channels-accordion">
        <summary style="cursor:pointer;font-weight:600;">Channels</summary>
        <div style="margin-top:12px;">
          <label style="display:flex;flex-direction:column;gap:6px;font-size:14px;">
            <span id="channels-label" class="tip" data-tip="">Source Urls</span>
            <textarea id="channels-input" style="min-height:140px;padding:8px;border:1px solid #cfd5e0;border-radius:6px;font-family:monospace;"></textarea>
          </label>
          <button id="save-channels-btn" style="margin-top:12px;">Save Channels</button>
          <span id="channels-status" class="muted"></span>
        </div>
      </details>
    </section>

    <section>
      <div class="row">
        <h3 style="margin:0;">Control Panel</h3>
        <button id="run-btn">Run</button>
        <button id="stop-btn">Stop</button>
        <span id="status-text" class="muted">Status: -</span>
      </div>
      <details id="logs-accordion" style="margin-top:10px;">
        <summary style="cursor:pointer;font-weight:600;">Log Viewer</summary>
        <div style="margin-top:10px;">
          <div id="logbox" class="logbox"></div>
        </div>
      </details>
    </section>

    <section>
      <div class="progress-wrap">
        <div class="progress-head">Processing</div>
        <div id="progressbox"></div>
      </div>
    </section>

    <section>
      <div class="report-wrap">
        <div id="reportbox" class="reportbox"></div>
      </div>
    </section>

  </div>

  <div id="report-modal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="report-modal-title">Report</strong>
        <button id="report-modal-close" class="report-open">Close</button>
      </div>
      <div class="modal-body">
        <div id="report-modal-body" class="md"></div>
      </div>
    </div>
  </div>

  <script>
    let config = null;
    let schema = [];
    let skipFirstLog = true;

    const cfgGrid = document.getElementById("config-grid");
    const saveBtn = document.getElementById("save-btn");
    const saveStatus = document.getElementById("save-status");
    const secretsGrid = document.getElementById("secrets-grid");
    const saveSecretsBtn = document.getElementById("save-secrets-btn");
    const secretsStatus = document.getElementById("secrets-status");
    const channelsInput = document.getElementById("channels-input");
    const saveChannelsBtn = document.getElementById("save-channels-btn");
    const channelsStatus = document.getElementById("channels-status");
    const channelsLabel = document.getElementById("channels-label");
    const statusText = document.getElementById("status-text");
    const runBtn = document.getElementById("run-btn");
    const stopBtn = document.getElementById("stop-btn");
    const logbox = document.getElementById("logbox");
    const reportbox = document.getElementById("reportbox");
    const progressbox = document.getElementById("progressbox");
    let prevProgress = new Map();  // video_id -> last in-progress row, to keep just-completed visible one cycle
    const reportModal = document.getElementById("report-modal");
    const reportModalTitle = document.getElementById("report-modal-title");
    const reportModalBody = document.getElementById("report-modal-body");
    const reportModalClose = document.getElementById("report-modal-close");
    let reportTitleMap = {};
    let isRunning = false;
    let startupDoneIds = null;
    const newIds = new Set();
    const reportCache = {};
    const expandedVids = new Set();   // vids whose inline brief is open — render reflects this
    let lastReportSig = "";

    async function fetchSchema() {
      const res = await fetch("/api/schema");
      const data = await res.json();
      schema = data.fields || [];
      updateChannelsLabel();
    }

    async function fetchConfig() {
      const res = await fetch("/api/config");
      config = await res.json();
      renderConfig();
      renderSecrets();
    }

    function renderConfig() {
      cfgGrid.innerHTML = "";
      schema.forEach(f => {
        const pathKey = f.key || f.name;
        if (pathKey === "SOURCE_URLS") return; // channels handled separately
        if (f.group === "secrets") return;      // secrets handled separately
        const value = getValueByPath(config, pathKey);
        cfgGrid.appendChild(fieldFromSchema(f, value));
      });
    }

    function renderSecrets() {
      secretsGrid.innerHTML = "";
      schema.forEach(f => {
        if (f.group !== "secrets") return;
        const pathKey = f.key || f.name;
        const value = getValueByPath(config, pathKey);
        secretsGrid.appendChild(fieldFromSchema(f, value));
      });
    }

    function renderChannels() {
      const list = Array.isArray(config?.SOURCE_URLS) ? config.SOURCE_URLS : [];
      channelsInput.value = list.join("\n");
    }

    function updateChannelsLabel() {
      if (!channelsLabel) return;
      const f = schema.find(x => (x.key || x.name) === "SOURCE_URLS");
      if (!f) return;
      channelsLabel.textContent = f.name;
      channelsLabel.dataset.tip = [f.desc || "", f.cn || ""].filter(Boolean).join("\n");
    }

    function fieldFromSchema(f, value) {
      const displayValue = deriveDisplayValue(f, value);
      const label = document.createElement("label");
      const span = document.createElement("span");
      span.className = "tip";
      span.dataset.tip = [f.desc || "", f.cn || ""].filter(Boolean).join("\n");
      span.textContent = f.name;
      label.appendChild(span);
      let el;
      if (f.type === "select") {
        el = document.createElement("select");
        const choices = Array.isArray(f.choices) ? f.choices : [];
        const selectedValue = choices.includes(displayValue) ? displayValue : (f.default ?? choices[0] ?? "");
        choices.forEach(opt => {
          const o = document.createElement("option");
          o.value = opt;
          o.textContent = opt;
          if (opt === selectedValue) o.selected = true;
          el.appendChild(o);
        });
      } else if (f.type === "int" || f.type === "int_optional" || f.type === "int_range") {
        el = document.createElement("input");
        el.type = "number";
        el.value = displayValue ?? "";
        if (f.min !== undefined) el.min = f.min;
        if (f.max !== undefined) el.max = f.max;
      } else {
        el = document.createElement("input");
        el.type = f.secret ? "password" : "text";
        el.value = displayValue ?? "";
      }
      const pathKey = f.key || f.name;
      el.onchange = (e) => updateField(pathKey, e.target.value);
      label.appendChild(el);
      return label;
    }

    function deriveDisplayValue(f, value) {
      if (f.type === "int_range") {
        if (typeof value === "string" && value.includes("-")) {
          const parts = value.split("-");
          return parts[1] || parts[0];
        }
      }
      return value;
    }

    function getValueByPath(obj, path) {
      return path.split(".").reduce((acc, key) => acc && acc[key] !== undefined ? acc[key] : null, obj);
    }

    function updateField(path, val) {
      if (path.startsWith("api_model.")) {
        const key = path.split(".")[1];
        config.api_model[key] = val;
      } else if (path === "SOURCE_URLS") {
        const list = val
          .split(/\r?\n/)
          .map(x => x.trim())
          .filter(Boolean);
        config.SOURCE_URLS = list;
      } else {
        config[path] = val;
      }
    }

    saveBtn.onclick = async () => {
      saveStatus.textContent = "Saving...";
      const payload = config;
      const res = await fetch("/api/config", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        config = await res.json();
        renderConfig();
        renderSecrets();
        renderChannels();
        saveStatus.textContent = "Saved";
      } else {
        saveStatus.textContent = "Failed to save";
      }
      setTimeout(() => saveStatus.textContent = "", 1500);
    };

    saveSecretsBtn.onclick = async () => {
      secretsStatus.textContent = "Saving...";
      const res = await fetch("/api/config", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(config)
      });
      if (res.ok) {
        config = await res.json();
        renderSecrets();
        secretsStatus.textContent = "Saved";
      } else {
        secretsStatus.textContent = "Failed to save";
      }
      setTimeout(() => secretsStatus.textContent = "", 1500);
    };

    saveChannelsBtn.onclick = async () => {
      updateField("SOURCE_URLS", channelsInput.value);
      saveStatus.textContent = "Saving...";
      const res = await fetch("/api/config", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(config)
      });
      if (res.ok) {
        config = await res.json();
        renderConfig();
        renderChannels();
        channelsStatus.textContent = "Saved";
      } else {
        channelsStatus.textContent = "Failed to save";
      }
      setTimeout(() => { saveStatus.textContent = ""; channelsStatus.textContent = ""; }, 1500);
    };

    runBtn.onclick = async () => {
      const res = await fetch("/api/run", { method: "POST" });
      if (res.status === 409) alert("Already running");
      await fetchStatus();
    };

    stopBtn.onclick = async () => {
      const res = await fetch("/api/stop", { method: "POST" });
      if (res.status === 409) alert("Not running");
      await fetchStatus();
    };

    async function fetchStatus() {
      const res = await fetch("/api/status");
      const data = await res.json();
      isRunning = !!data.running;
      statusText.textContent = data.running ? `Status: running (pid ${data.pid})` : "Status: stopped";
      runBtn.disabled = data.running;
      stopBtn.disabled = !data.running;
    }

    async function fetchLog() {
      if (skipFirstLog) { logbox.textContent = ""; skipFirstLog = false; return; }
      const res = await fetch("/api/log?tail=4000");
      const data = await res.json();
      logbox.textContent = data.log || "";
      logbox.scrollTop = logbox.scrollHeight;
    }

    function escapeHtml(s) {
      return (s || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function renderMarkdown(src) {
      let s = escapeHtml(src || "").replace(/\r\n/g, "\n");

      // fenced code blocks
      s = s.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code}</code></pre>`);

      // headers
      s = s.replace(/^### (.+)$/gm, "<h3>$1</h3>");
      s = s.replace(/^## (.+)$/gm, "<h2>$1</h2>");
      s = s.replace(/^# (.+)$/gm, "<h1>$1</h1>");

      // unordered lists
      s = s.replace(/(?:^|\n)- (.+)(?=\n|$)/g, "\n<li>$1</li>");
      s = s.replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>");
      s = s.replace(/<\/ul>\s*<ul>/g, "");

      // inline formats
      s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");

      // paragraphs + line breaks
      const blocks = s.split(/\n{2,}/).map(b => b.trim()).filter(Boolean).map(b => {
        if (/^<(h1|h2|h3|ul|pre)/.test(b)) return b;
        return `<p>${b.replace(/\n/g, "<br>")}</p>`;
      });
      return blocks.join("\n");
    }

    function cleanSource(s) {
      return (s || "")
        .replace(/^https?:\/\/www\./i, "")
        .replace(/^https?:\/\//i, "")
        .replace(/\/+$/g, "")
        .trim();
    }

    function cleanTitle(s) {
      return (s || "")
        .replace(/#[^\s#]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatDownloadedAt(downloadedAt) {
      const raw = (downloadedAt || "").trim();
      if (!raw) return "";
      if (/^\d{8}$/.test(raw)) {
        return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)} 00-00-00`;
      }
      if (/^\d{14}$/.test(raw)) {
        return `${raw.slice(0, 4)}-${raw.slice(4, 6)}-${raw.slice(6, 8)} ${raw.slice(8, 10)}-${raw.slice(10, 12)}-${raw.slice(12, 14)}`;
      }
      const norm = raw.replace("T", " ");
      const parts = norm.split(" ");
      const datePart = parts[0] || "";
      const timePart = (parts[1] || "00:00:00").split(".")[0];
      const hhmmss = timePart.replaceAll(":", "-");
      return `${datePart} ${hhmmss}`;
    }

    function statusHtml(item) {
      if (newIds.has(item.video_id)) return `<span class="status"><span class="dot dot-red"></span>NEW</span>`;
      if (item.pushed === 1) return `<span class="status"><span class="dot dot-green"></span>done</span>`;
      if (isRunning) return `<span class="status"><span class="spinner"></span>running</span>`;
      return `<span class="status"><span class="dot dot-gray"></span>queued</span>`;
    }

    function renderReports(items) {
      if (!Array.isArray(items) || items.length === 0) {
        reportbox.innerHTML = `<div class="report-meta">No downloaded entries yet.</div>`;
        return;
      }
      reportTitleMap = {};
      const groups = new Map();
      const localItems = [];
      const renderItem = (item) => {
        const headlineMd = renderMarkdown((item.headline || "").trim());
        const clean = cleanTitle(item.title || item.video_id || "(no title)");
        const title = escapeHtml(clean);
        const date = escapeHtml(formatDownloadedAt(item.downloaded_at));
        const canOpen = !!item.report_exists;
        const vid = escapeHtml(item.video_id || "");
        if (item.video_id) reportTitleMap[item.video_id] = clean;
        const isNew = newIds.has(item.video_id);
        const expanded = expandedVids.has(item.video_id) && reportCache[item.video_id];
        const expandHtml = expanded
          ? `<div class="recommend-block md">${renderMarkdown(reportCache[item.video_id].recommend || "")}</div>`
          : "";
        return `
          <div class="report-item${isNew ? " is-new" : ""}" data-vid="${vid}">
            <div class="report-card-head">
              ${headlineMd ? `<div class="report-headline md">${headlineMd}</div>` : ""}
              <div class="${headlineMd ? "report-subtitle" : "report-title"}">${title}</div>
              <div class="report-footer">
                <span class="report-meta">${date}</span>
                ${statusHtml(item)}
                <span style="margin-left:auto;display:flex;gap:6px;">
                  ${headlineMd ? `<button class="report-open btn-toggle" data-vid="${vid}">Brief ${expanded ? "▴" : "▾"}</button>` : ""}
                  ${canOpen ? `<button class="report-open btn-report" data-vid="${vid}">Report</button>` : ""}
                </span>
              </div>
            </div>
            <div class="report-expand recommend-expand"${expanded ? ' data-loaded="1"' : " hidden"}>${expandHtml}</div>
          </div>
        `;
      };

      items.forEach(item => {
        const key = cleanSource(item.source || "unknown") || "unknown";
        if (key.toLowerCase() === "local") {
          localItems.push(item);
          return;
        }
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });

      const groupedHtml = Array.from(groups.entries()).map(([sourceKey, rows]) => {
        const entriesHtml = rows.map(renderItem).join("");
        return `
          <div class="report-group">
            <div class="report-group-head">${escapeHtml(cleanSource(sourceKey))}</div>
            <div class="report-group-items">${entriesHtml}</div>
          </div>
        `;
      }).join("");

      const localHtml = localItems.length
        ? `
          <div class="report-group">
            <div class="report-group-head">local</div>
            <div class="report-local-items">${localItems.map(renderItem).join("")}</div>
          </div>
        `
        : "";

      reportbox.innerHTML = groupedHtml + localHtml;
    }

    async function fetchReports() {
      try {
        const res = await fetch("/api/reports?limit=300");
        const data = await res.json();
        const items = data.items || [];
        const sig = JSON.stringify(items.map(i => `${i.video_id}:${i.pushed}:${i.headline}`));
        if (startupDoneIds === null) {
          startupDoneIds = new Set(items.filter(i => i.pushed === 1).map(i => i.video_id));
          lastReportSig = sig;
          renderReports(items);
          return;
        }
        let hasNew = false;
        items.forEach(item => {
          if (item.pushed === 1 && !startupDoneIds.has(item.video_id)) {
            newIds.add(item.video_id);
            hasNew = true;
          }
        });
        if (sig !== lastReportSig || hasNew) {
          lastReportSig = sig;
          renderReports(items);
        }
      } catch (_) {
        reportbox.innerHTML = `<div class="report-meta">Report list load failed.</div>`;
      }
    }

    function progressCell(state) {
      const label = state === "done" ? "Done" : state === "error" ? "Error" : "…";
      return `<span class="cell ${state}">${label}</span>`;
    }

    function transcribeCell(it) {
      if (it.transcribe === "pending" && it.transcribe_progress > 0) {
        const pct = Math.min(99, it.transcribe_progress);
        return `<div class="bar"><div class="bar-fill" style="width:${pct}%"></div><span class="bar-label">${pct}%</span></div>`;
      }
      return progressCell(it.transcribe);
    }

    function renderProgress(items) {
      // carry tasks that just left the in-progress set (completed) for one more cycle
      const currentIds = new Set(items.map(i => i.video_id));
      const justDone = [];
      prevProgress.forEach((row, id) => {
        if (!currentIds.has(id)) {
          justDone.push({ ...row, download: "done", transcribe: "done", summarize: "done", push: "done", _justDone: true });
        }
      });
      prevProgress = new Map(items.map(i => [i.video_id, i]));
      const all = items.concat(justDone);

      if (!all.length) {
        progressbox.innerHTML = `<div class="progress-empty">No tasks in progress.</div>`;
        return;
      }
      const rows = all.map(it => {
        const id = it.video_id || "";
        const shortId = id.length > 12 ? id.slice(0, 12) + "…" : id;
        const cost = it.cost ? `$${Number(it.cost).toFixed(4)}` : "";
        const tokens = it.tokens ? it.tokens.toLocaleString() : "";
        return `<tr class="${it._justDone ? "done-row" : ""}">
          <td class="title" title="${(it.title || "").replace(/"/g, "&quot;")}">${it.title || shortId}</td>
          <td>${progressCell(it.download)}</td>
          <td>${transcribeCell(it)}</td>
          <td>${progressCell(it.summarize)}</td>
          <td>${progressCell(it.push)}</td>
          <td class="num">${tokens}</td>
          <td class="num">${cost}</td>
        </tr>`;
      }).join("");
      progressbox.innerHTML = `<table class="progress">
        <thead><tr>
          <th>Title</th><th>Download</th><th>Transcribe</th><th>Summarize</th><th>Push</th>
          <th class="num">Token</th><th class="num">Cost</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    async function fetchProgress() {
      try {
        const res = await fetch("/api/progress?limit=300");
        const data = await res.json();
        renderProgress(data.items || []);
      } catch (_) {
        progressbox.innerHTML = `<div class="progress-empty">Progress load failed.</div>`;
      }
    }

    async function loadReport(vid) {
      if (!reportCache[vid]) {
        try {
          const res = await fetch(`/api/report/${encodeURIComponent(vid)}`);
          reportCache[vid] = res.ok ? await res.json() : {};
        } catch (_) {
          reportCache[vid] = {};
        }
      }
      return reportCache[vid];
    }

    // intervals
    async function stopSilently() {
      try { await fetch("/api/stop", { method: "POST" }); } catch (_) {}
    }

    async function clearLogFile() {
      try { await fetch("/api/log/clear", { method: "POST" }); } catch (_) {}
      logbox.textContent = "";
      skipFirstLog = true;
    }

    reportbox.addEventListener("click", async (e) => {
      // Brief inline toggle
      const toggleBtn = e.target.closest(".btn-toggle");
      if (toggleBtn) {
        const vid = toggleBtn.dataset.vid;
        const card = reportbox.querySelector(`.report-item[data-vid="${CSS.escape(vid)}"]`);
        if (!card) return;
        const expandDiv = card.querySelector(".recommend-expand");
        const willExpand = expandDiv.hidden;
        if (willExpand) {
          if (!expandDiv.dataset.loaded) {
            const prev = toggleBtn.textContent;
            toggleBtn.textContent = "Loading…";
            const data = await loadReport(vid);
            expandDiv.innerHTML = `<div class="recommend-block md">${renderMarkdown(data.recommend || "")}</div>`;
            expandDiv.dataset.loaded = "1";
            toggleBtn.textContent = prev;
          }
          expandedVids.add(vid);
        } else {
          expandedVids.delete(vid);
        }
        expandDiv.hidden = !willExpand;
        toggleBtn.textContent = `Brief ${willExpand ? "▴" : "▾"}`;
        return;
      }

      // Report modal
      const reportBtn = e.target.closest(".btn-report");
      if (reportBtn) {
        const vid = reportBtn.dataset.vid;
        newIds.delete(vid);
        reportModalTitle.textContent = reportTitleMap[vid] || vid;
        reportModalBody.innerHTML = "Loading…";
        reportModal.classList.add("show");
        const data = await loadReport(vid);
        reportModalBody.innerHTML = renderReport(vid, data);
        wireFeedback(reportModalBody, vid, data);
      }
    });

    reportModalClose.onclick = () => reportModal.classList.remove("show");
    reportModal.onclick = (e) => { if (e.target === reportModal) reportModal.classList.remove("show"); };

    // Human-facing labels, shown per READ_LANGUAGE
    const FB_TXT = {
      headline:  { en: "Headline",  zh: "标题" },
      brief:     { en: "Brief",     zh: "简报" },
      recommend: { en: "Recommend", zh: "推荐" },
      submit:    { en: "Submit feedback", zh: "提交意见" },
      ph:        { en: "Feedback (leave empty = fine)", zh: "改进意见（不填=满意）" },
    };
    function fbLang() { return (config && config.READ_LANGUAGE === "chinese") ? "zh" : "en"; }
    function fbt(key) { return FB_TXT[key][fbLang()]; }

    function fbBox(stage, saved) {
      return `<div class="fb" data-stage="${stage}">
        <textarea class="fb-input" rows="2" placeholder="${fbt("ph")}">${escapeHtml(saved || "")}</textarea>
        <div><button class="fb-send" data-stage="${stage}">${fbt("submit")}</button><span class="fb-status"></span></div>
      </div>`;
    }

    function renderReport(vid, data) {
      const fb = data.feedback || {};
      const h = (data.headline || "").trim();
      const c = (data.content || "").trim();
      const r = (data.recommend || "").trim();
      let html = "";
      if (h) html += `<h3>${fbt("headline")}</h3><div class="md">${renderMarkdown(h)}</div>` + fbBox("headline", fb.headline);
      html += `<h3>${fbt("brief")}</h3><div class="md">${renderMarkdown(c)}</div>` + fbBox("brief", fb.brief);
      if (r) html += `<h3>${fbt("recommend")}</h3><div class="recommend-block md">${renderMarkdown(r)}</div>` + fbBox("recommend", fb.recommend);
      return html;
    }

    function wireFeedback(container, vid, data) {
      container.querySelectorAll(".fb-send").forEach(btn => {
        btn.onclick = async () => {
          const box = btn.closest(".fb");
          const stage = btn.dataset.stage;
          const opinion = box.querySelector(".fb-input").value.trim();
          const status = box.querySelector(".fb-status");
          if (!opinion) { status.textContent = "empty"; return; }
          status.textContent = "submitting…";
          try {
            const res = await fetch("/api/feedback", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ video_id: vid, stage, opinion }),
            });
            if (res.ok) {
              data.feedback = data.feedback || {};
              data.feedback[stage] = opinion;   // update cached report so reopen prefills
            }
            status.textContent = res.ok ? "saved ✓" : "failed";
          } catch (_) { status.textContent = "failed"; }
        };
      });
    }

    (async () => {
      logbox.textContent = "";
      await fetchSchema();
      await fetchConfig();  // calls renderConfig + renderSecrets internally
      renderChannels();
      await stopSilently(); // ensure status starts stopped
      await clearLogFile(); // clear historical logs
      async function tick() {
        await fetchStatus();
        await fetchLog();
        await fetchReports();
        await fetchProgress();
      }
      tick();
      setInterval(tick, 1500);
    })();
  </script>
</body>
</html>
